<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coglyde OG Image</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1200px;
      height: 630px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #0f1629 50%, #0a0a1f 100%);
      position: relative;
      overflow: hidden;
    }

    /* Subtle background texture/grid */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Orbital accent element */
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border: 1px solid rgba(16, 185, 129, 0.15);
      border-radius: 50%;
      top: -150px;
      right: -100px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.6);
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      tracking: 0.05em;
    }

    .content {
      max-width: 900px;
    }

    .logo {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.95) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
      text-transform: uppercase;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .tagline {
      font-size: 32px;
      font-weight: 300;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: -0.3px;
      margin-bottom: 32px;
    }

    .accent-line {
      width: 120px;
      height: 3px;
      background: linear-gradient(90deg, #10b981 0%, rgba(16, 185, 129, 0) 100%);
      border-radius: 2px;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.02em;
    }

    .url {
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      color: rgba(16, 185, 129, 0.8);
    }

    .corner-accent {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at top-left, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .top-right-orbit {
      position: absolute;
      top: -50px;
      right: 60px;
      width: 150px;
      height: 150px;
      border: 1px solid rgba(59, 130, 246, 0.1);
      border-radius: 50%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="top-right-orbit"></div>
  <div class="corner-accent"></div>

  <div class="container">
    <div class="header">
      <div class="dot"></div>
      <span class="label">Web Design & Digital Marketing</span>
    </div>

    <div class="content">
      <div class="logo">COGLYDE</div>
      <div class="tagline">Building sites that glide past the competition</div>
      <div class="accent-line"></div>
    </div>

    <div class="footer">
      <span>Vancouver-based design studio</span>
      <span class="url">coglyde.com</span>
    </div>
  </div>
</body>
</html>
